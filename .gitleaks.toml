title = "Gitleaks config"

[[rules]]
id = "kubernetes-kubeconfig-token"
description = "Kubernetes kubeconfig service account token"
regex = '''token:\s+eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'''
tags = ["kubernetes", "kubeconfig"]

[[rules]]
id = "kubernetes-kubeconfig-cert"
description = "Kubernetes kubeconfig certificate-authority-data"
regex = '''certificate-authority-data:\s+[A-Za-z0-9+/]{100,}={0,2}'''
tags = ["kubernetes", "kubeconfig"]
